spring.application.name=isemid

server.port=${SERVER_PORT:8081}

server.forward-headers-strategy=framework
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
server.shutdown=graceful

spring.lifecycle.timeout-per-shutdown-phase=60s

spring.datasource.hikari.pool-name=IsemidHikariPool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Tashkent
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

#spring.liquibase.enabled=true
#spring.liquibase.change-log=classpath:db.migration/db.changelog-master.yaml

spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

spring.jackson.time-zone=Asia/Tashkent
spring.cache.type=caffeine

management.endpoints.web.base-path=/v1/actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:0.1}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.observability.trace-id-header=X-Trace-Id
app.observability.accept-incoming-trace-id=true
app.observability.trace-id-min-length=16
app.observability.trace-id-max-length=64
app.observability.trace-id-allowed-separators=-_.:
app.observability.http-logging.enabled=true
app.observability.http-logging.log-successful-requests=false
app.observability.http-logging.slow-request-threshold-ms=1000
app.observability.http-logging.max-text-length=500
app.observability.http-logging.max-user-agent-length=300
app.observability.http-logging.organization-header=X-Organization-Id
app.observability.http-logging.include-query-string=true
app.observability.http-logging.include-user-agent=true
app.observability.http-logging.mask-path-identifiers=true
app.observability.http-logging.excluded-path-prefixes=/favicon.ico,/actuator/health,/v1/actuator/health,/swagger-ui,/v3/api-docs
app.observability.http-logging.sensitive-query-parameters=access_token,refresh_token,token,password,secret,client_secret,api_key,apikey,pinfl,nnuzb,passport,passport_number,birth_certificate,phone,patient_id,patient_identifier,medical_record_number
app.observability.outbound-http-logging.enabled=true
app.observability.outbound-http-logging.log-successful-requests=false
app.observability.outbound-http-logging.slow-request-threshold-ms=2000
app.observability.outbound-http-logging.include-headers=false
app.observability.outbound-http-logging.log-request-body=false
app.observability.outbound-http-logging.log-response-body=false
app.observability.outbound-http-logging.max-body-bytes=16384
app.observability.outbound-http-logging.allowed-text-content-types=application/json,application/*+json,application/xml,application/*+xml,application/x-www-form-urlencoded,text/*
app.observability.async-executor.core-pool-size=${ASYNC_CORE_POOL_SIZE:8}
app.observability.async-executor.max-pool-size=${ASYNC_MAX_POOL_SIZE:32}
app.observability.async-executor.queue-capacity=${ASYNC_QUEUE_CAPACITY:2000}
app.observability.async-executor.keep-alive-seconds=60
app.observability.async-executor.await-termination-seconds=30
app.observability.async-executor.thread-name-prefix=app-async-

app.scope.tashkent-region-code=UZ-TK

app.security.http.connect-timeout=3s
app.security.http.read-timeout=5s
app.security.http.connection-request-timeout=2s
app.security.http.connection-time-to-live=5m
app.security.http.evict-idle-connections-after=30s
app.security.http.max-connections=100
app.security.http.max-connections-per-route=50
app.iam.role-sync.create-missing-roles=true
