spring.application.name=isemid

server.port=${SERVER_PORT:8080}

server.forward-headers-strategy=framework
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

spring.datasource.hikari.pool-name=IsemidHikariPool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Tashkent
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db.migration/db.changelog-master.yaml

spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

spring.jackson.time-zone=Asia/Tashkent
spring.cache.type=caffeine

management.endpoints.web.base-path=/v1/actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.tracing.sampling.probability=${TRACING_SAMPLING_PROBABILITY:0.1}

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.observability.trace-id-header=X-Trace-Id

app.scope.tashkent-region-code=UZ-TK

app.security.http.connect-timeout=3s
app.security.http.read-timeout=5s
app.security.http.connection-request-timeout=2s
app.security.http.connection-time-to-live=5m
app.security.http.evict-idle-connections-after=30s
app.security.http.max-connections=100
app.security.http.max-connections-per-route=50
app.security.http.logging-enabled=true
app.security.http.log-request-body=true
app.security.http.log-response-body=true
app.security.http.max-logged-body-size-bytes=16384

app.iam.role-sync.create-missing-roles=true
