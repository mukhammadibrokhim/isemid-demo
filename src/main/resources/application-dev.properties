spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/isemid2}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root123}
spring.jpa.show-sql=false

logging.level.uz.uzinfocom.app=DEBUG
logging.level.org.springframework.security=INFO

#spring.liquibase.change-log=classpath:db.migration/db.changelog-master.yaml
#spring.liquibase.liquibase-schema=public

app.base-uri=https://test-ykem.sanepid.uz/api

# =========================
# SSV SSO - DEV / TEST
# =========================
app.auth.providers.sso.enabled=true
app.auth.providers.sso.auth-base-domain=${SSO_AUTH_BASE_DOMAIN:https://test-sso.ssv.uz}
app.auth.providers.sso.iam-api-base-domain=${SSO_IAM_API_BASE_DOMAIN:https://test-api2.ssv.uz}
app.auth.providers.sso.issuer-uri=${SSO_ISSUER_URI:${app.auth.providers.sso.auth-base-domain}}
app.auth.providers.sso.signature-mode=PUBLIC_KEY_ENDPOINT
app.auth.providers.sso.public-key-uri=${SSO_PUBLIC_KEY_URI:${app.auth.providers.sso.auth-base-domain}/public-key}
app.auth.providers.sso.validate-audience=false
app.auth.providers.sso.validate-issuer=false
app.auth.providers.sso.missing-issuer-marker-claim=user_info
app.auth.providers.sso.audiences=
app.auth.providers.sso.iam.organization-url-template=${SSO_ORGANIZATION_URL_TEMPLATE:${app.auth.providers.sso.iam-api-base-domain}/v2/Organization/{uuid}}
app.auth.providers.sso.iam.practitioner-url-template=${SSO_PRACTITIONER_URL_TEMPLATE:${app.auth.providers.sso.iam-api-base-domain}/v2/Practitioner/{uuid}}


# =========================
# DHP - PLAYGROUND
# =========================
app.auth.providers.dhp.enabled=true
app.auth.providers.dhp.auth-base-domain=${DHP_AUTH_BASE_DOMAIN:https://playground.dhp.uz/sso}
app.auth.providers.dhp.fhir-base-domain=${DHP_FHIR_BASE_DOMAIN:https://playground.dhp.uz/fhir}
app.auth.providers.dhp.issuer-uri=${DHP_ISSUER_URI:${app.auth.providers.dhp.auth-base-domain}}
app.auth.providers.dhp.signature-mode=JWKS_URI
app.auth.providers.dhp.jwk-set-uri=${DHP_JWKS_URI:${app.auth.providers.dhp.auth-base-domain}/.well-known/jwks.json}
app.auth.providers.dhp.validate-issuer=true
app.auth.providers.dhp.validate-audience=false
app.auth.providers.dhp.audiences=
app.auth.providers.dhp.iam.organization-url-template=${DHP_ORGANIZATION_URL_TEMPLATE:${app.auth.providers.dhp.fhir-base-domain}/Organization/{uuid}}
app.auth.providers.dhp.iam.practitioner-url-template=${DHP_PRACTITIONER_URL_TEMPLATE:${app.auth.providers.dhp.fhir-base-domain}/Practitioner/{uuid}}

# API2 integration
integration.api2.base-url=${API2_BASE_URL:https://test-api2.ssv.uz}
integration.api2.connect-timeout=${API2_CONNECT_TIMEOUT:3s}
integration.api2.read-timeout=${API2_READ_TIMEOUT:15s}

# Citizen endpoints
integration.api2.endpoints.child=${API2_CHILD_ENDPOINT:/v3/Child}
integration.api2.endpoints.citizen=${API2_CITIZEN_ENDPOINT:/v3/Citizen}
integration.api2.endpoints.citizen-passport=${API2_CITIZEN_PASSPORT_ENDPOINT:/v3/CitizenPassport}

# Legal Entity endpoint
integration.api2.endpoints.legal-entity=${API2_LEGAL_ENTITY:/v3/LegalEntity}
